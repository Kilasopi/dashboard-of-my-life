services:
  backend:
    build:
      context: ./app/backend
    container_name: dashboard-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    develop:
      watch:
        - action: sync
          path: ./app/backend
          target: /app
          initial_sync: true
          ignore:
            - .venv/
            - __pycache__/
            - .pytest_cache/
            - .ruff_cache/
        - action: rebuild
          path: ./app/backend/requirements.txt

  frontend:
    build:
      context: ./app/frontend
    container_name: dashboard-frontend
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_FORCE_POLLING=true
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3000
    develop:
      watch:
        - action: sync
          path: ./app/frontend
          target: /app
          initial_sync: true
          ignore:
            - node_modules/
            - dist/
            - .vite/
        - action: rebuild
          path: ./app/frontend/package.json
        - action: rebuild
          path: ./app/frontend/package-lock.json